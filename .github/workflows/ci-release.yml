name: CI + Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Quality gate: runs on every push (main, PRs, and tags).
  # When a tag is pushed, this job must pass before release starts.
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare ffmpeg
        # npm ci runs postinstall, but this is idempotent and keeps the CI
        # dependency local to the repo instead of waiting on apt mirrors.
        timeout-minutes: 2
        run: npm run fetch:ffmpeg

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Run Python delogo smoke tests
        # Run Python pipeline tests to catch regressions in the FFmpeg filter
        # graph builder. These tests validate delogo chains, e2e pipeline, and
        # edge cases. They require ffmpeg which is fetched above.
        # Uses continue-on-error so a missing ffmpeg binary on CI does not
        # block the JS quality gate. The definitive Python validation happens
        # on the Windows build job.
        continue-on-error: true
        run: |
          if [ -f bin/ffmpeg ] || [ -f bin/ffmpeg.exe ]; then
            python python/test_delogo.py
            python python/test_delogo_robust.py
          else
            echo "ffmpeg not found in bin/ — skipping Python tests"
          fi

  # Build & publish: only runs on tag pushes.
  # `needs: test` ensures tests pass (in Ubuntu) before building on Windows.
  release:
    name: Build & Release (Windows)
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: test
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build bundled processor & fetch ffmpeg
        run: |
          npm run build:processor
          npm run fetch:ffmpeg

      - name: Run Python delogo tests
        # Run the Python pipeline tests on Windows where ffmpeg is guaranteed
        # to be available after the fetch step above.
        run: npm run test:python

      - name: Build renderer
        run: npx vite build

      - name: Verify signing secrets
        # On tag pushes, the installer must be signed. Fail if secrets are missing.
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        run: |
          if (-not "${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}") {
            Write-Error "WINDOWS_CERTIFICATE_BASE64 secret is missing — cannot sign installer for release"
            exit 1
          }

      - name: Package & publish
        shell: pwsh
        # Only set CSC_LINK / CSC_KEY_PASSWORD when the signing secrets are present.
        # electron-builder treats an empty CSC_LINK as a relative path, which
        # would resolve to the runner's cwd and crash the build with
        # "WIN_CSC_LINK is not correct, cannot resolve: D:\a\beru\beru".
        run: |
          $cscLink = "${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}"
          $cscKey  = "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
          $env:GH_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          $env:CSC_IDENTITY_AUTO_DISCOVERY = 'false'
          if ($cscLink) { $env:CSC_LINK = $cscLink }
          if ($cscKey)  { $env:CSC_KEY_PASSWORD = $cscKey }
          npx electron-builder --publish always

      - name: Verify installer signature
        # Post-build safety net: confirm the .exe is actually signed before
        # the workflow succeeds. Catches misconfigured CSC_LINK (e.g. a cert
        # that resolves to the wrong file) and silent unsigned publishing.
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist-installer -Filter "Beru-Setup-*.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No installer .exe found in dist-installer/"
            exit 1
          }
          $sig = Get-AuthenticodeSignature -FilePath $exe.FullName
          Write-Host "Installer: $($exe.Name)"
          Write-Host "Signature status: $($sig.Status)"
          if ($sig.SignerCertificate) {
            Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          }
          if ($sig.Status -ne "Valid") {
            Write-Error "Installer signature is not Valid (status: $($sig.Status)). Refusing to publish an unsigned installer."
            exit 1
          }

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: beru-installers
          path: |
            dist-installer/*.exe
            dist-installer/*.exe.blockmap
            dist-installer/latest.yml
          if-no-files-found: ignore
          retention-days: 14
