name: CI + Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Quality gate: runs on every push (main, PRs, and tags).
  # When a tag is pushed, this job must pass before release starts.
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare ffmpeg
        # npm ci runs postinstall, but this is idempotent and keeps the CI
        # dependency local to the repo instead of waiting on apt mirrors.
        timeout-minutes: 2
        run: npm run fetch:ffmpeg

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Run Python delogo smoke tests
        # Run Python pipeline tests to catch regressions in the FFmpeg filter
        # graph builder. These tests validate delogo chains, e2e pipeline, and
        # edge cases. They require ffmpeg which is fetched above.
        # Uses continue-on-error so a missing ffmpeg binary on CI does not
        # block the JS quality gate. The definitive Python validation happens
        # on the Windows build job.
        continue-on-error: true
        run: |
          if [ -f bin/ffmpeg ] || [ -f bin/ffmpeg.exe ]; then
            python python/test_delogo.py
            python python/test_delogo_robust.py
          else
            echo "ffmpeg not found in bin/ — skipping Python tests"
          fi

  # Build & publish: only runs on tag pushes.
  # `needs: test` ensures tests pass (in Ubuntu) before building on Windows.
  release:
    name: Build & Release (Windows)
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: test
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build bundled processor & fetch ffmpeg
        run: |
          npm run build:processor
          npm run fetch:ffmpeg

      - name: Run Python delogo tests
        # Run the Python pipeline tests on Windows where ffmpeg is guaranteed
        # to be available after the fetch step above.
        run: npm run test:python

      - name: Build renderer
        # Inject Supabase credentials so the login gate and user-management
        # panel are compiled into the shipped renderer. Vite bakes VITE_*
        # env vars at build time; without these, isSupabaseConfigured is false
        # and BeruRoot boots straight into the editor (no login screen). The
        # .env file is gitignored so it is never present on the runner — these
        # secrets are the only source. If a secret is missing the build still
        # succeeds but ships without auth (graceful fallback).
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npx vite build

      - name: Package & publish
        shell: pwsh
        # Only set CSC_LINK / CSC_KEY_PASSWORD when the signing secrets are
        # present. When the cert secrets are absent, electron-builder builds
        # an unsigned installer and still publishes it (SmartScreen will warn
        # at install time). This lets releases ship while the cert is being
        # provisioned; add WINDOWS_CERTIFICATE_BASE64 /
        # WINDOWS_CERTIFICATE_PASSWORD to the repo secrets to enable signing.
        # electron-builder treats an empty CSC_LINK as a relative path, which
        # would resolve to the runner's cwd and crash the build with
        # "WIN_CSC_LINK is not correct, cannot resolve: D:\a\beru\beru".
        run: |
          $cscLink = "${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}"
          $cscKey  = "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
          $env:GH_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          $env:CSC_IDENTITY_AUTO_DISCOVERY = 'false'
          if ($cscLink) { $env:CSC_LINK = $cscLink }
          if ($cscKey)  { $env:CSC_KEY_PASSWORD = $cscKey }
          if (-not $cscLink) {
            Write-Warning "WINDOWS_CERTIFICATE_BASE64 secret is not set — publishing an UNSIGNED installer. Set the secret to enable Authenticode signing."
          }
          npx electron-builder --publish always

      - name: Verify installer signature
        # Post-build diagnostic: log the Authenticode signature status of the
        # produced installer. When the signing secrets are present this should
        # report "Valid"; when absent it will report "NotSigned" and the build
        # still succeeds (the installer is publishable but SmartScreen will
        # warn). Add WINDOWS_CERTIFICATE_BASE64 to enable hard-fail behavior.
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist-installer -Filter "Beru-Setup-*.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No installer .exe found in dist-installer/"
            exit 1
          }
          $sig = Get-AuthenticodeSignature -FilePath $exe.FullName
          Write-Host "Installer: $($exe.Name)"
          Write-Host "Signature status: $($sig.Status)"
          if ($sig.SignerCertificate) {
            Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          } else {
            Write-Host "Signer: (none — installer is unsigned)"
          }
          if ($sig.Status -ne "Valid") {
            Write-Warning "Installer signature is not Valid (status: $($sig.Status)). Publishing anyway because signing secrets are optional. Set WINDOWS_CERTIFICATE_BASE64 to enforce signing."
          }

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: beru-installers
          path: |
            dist-installer/*.exe
            dist-installer/*.exe.blockmap
            dist-installer/latest.yml
          if-no-files-found: ignore
          retention-days: 14
