name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build renderer
        run: npx vite build

      - name: Package & publish
        shell: pwsh
        # Only set CSC_LINK / CSC_KEY_PASSWORD when the signing secrets are present.
        # electron-builder treats an empty CSC_LINK as a relative path, which
        # would resolve to the runner's cwd and crash the build with
        # "WIN_CSC_LINK is not correct, cannot resolve: D:\a\beru\beru".
        run: |
          $cscLink = "${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}"
          $cscKey  = "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
          $env:GH_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          $env:CSC_IDENTITY_AUTO_DISCOVERY = 'false'
          if ($cscLink) { $env:CSC_LINK = $cscLink }
          if ($cscKey)  { $env:CSC_KEY_PASSWORD = $cscKey }
          npx electron-builder --publish always

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: beru-installers
          path: |
            dist-installer/*.exe
            dist-installer/*.exe.blockmap
            dist-installer/latest.yml
          if-no-files-found: ignore
          retention-days: 14