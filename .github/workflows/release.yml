name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build renderer
        run: npx vite build

      - name: Package & publish (electron-builder)
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code signing unless secrets are configured
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: beru-installers
          path: |
            dist-installer/*.exe
            dist-installer/*.exe.blockmap
            dist-installer/latest.yml
          if-no-files-found: ignore
          retention-days: 14
