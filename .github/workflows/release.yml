name: Release - Small & Optimized

on:
  workflow_dispatch:
    inputs:
      ffmpeg_url:
        description: "Custom FFmpeg download URL (for slim builds ~30-60MB). Leave empty for default."
        required: false
        type: string
      compile_minimal:
        description: "Compile minimal FFmpeg FROM SOURCE using MSYS2 (EXTREMELY SLOW on GitHub runners: 1-3+ hours). Only use when you want the absolute smallest binary."
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install dependencies
        run: npm ci

      # === Path 1: Download prebuilt slim FFmpeg (fast, recommended) ===
      - name: Download prebuilt FFmpeg
        if: ${{ !github.event.inputs.compile_minimal }}
        env:
          FFMPEG_DOWNLOAD_URL: ${{ github.event.inputs.ffmpeg_url }}
        run: npm run ffmpeg:download:force

      # === Path 2: Compile minimal FFmpeg from source (aggressive, very slow) ===
      # WARNING: This can take 1.5–3+ hours on GitHub-hosted runners (only 2 cores).
      # Use this only for important releases where minimum size is critical.
      # For regular use, prefer passing a pre-built slim URL in `ffmpeg_url`.
      - name: Setup MSYS2 for minimal FFmpeg compilation
        if: ${{ github.event.inputs.compile_minimal }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-yasm
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-pkgconf
            git
            make

      - name: Compile minimal FFmpeg from source (clean build)
        if: ${{ github.event.inputs.compile_minimal }}
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE"
          chmod +x scripts/build-ffmpeg-minimal.sh
          ./scripts/build-ffmpeg-minimal.sh "/c/Users/runneradmin/Desktop/Beru/src-tauri/bin" --clean

      - name: Build (optimized release profile)
        run: npm run tauri:build

      - name: Show final binary sizes (aggressive transparency)
        run: |
          echo "=== Rust binary ==="
          ls -lh src-tauri/target/release/*.exe 2>$null || dir src-tauri/target/release/*.exe
          echo ""
          echo "=== Bundled FFmpeg (this dominates installer size) ==="
          ls -lh src-tauri/bin/ffmpeg.exe 2>$null || echo "ffmpeg.exe not found in bin/"
          echo ""
          echo "=== Final installers ==="
          ls -lh src-tauri/target/release/bundle/nsis/*.exe 2>$null || dir src-tauri/target/release/bundle/nsis/*.exe
          ls -lh src-tauri/target/release/bundle/msi/*.msi 2>$null || dir src-tauri/target/release/bundle/msi/*.msi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Beru-Windows-Optimized
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/beru.exe

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          draft: true
          generate_release_notes: true
